name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM
        run: |
          gcloud compute ssh sorensen@obsidian-vm \
            --zone=us-east1-b \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --command="nohup bash /home/sorensen/obsidian_open_brain/scripts/deploy.sh > /tmp/deploy.log 2>&1; cat /tmp/deploy.log"

      - name: Health check
        run: |
          gcloud compute ssh sorensen@obsidian-vm \
            --zone=us-east1-b \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --command="systemctl is-active obsidian-watcher && tail -1 /tmp/deploy.log | grep -q DEPLOY_SUCCESS"
