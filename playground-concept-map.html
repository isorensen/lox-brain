<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Brain — Concept Map</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242834;--border:#2e3346;
  --text:#e2e4eb;--text-muted:#8b8fa3;--accent:#6366f1;
  --know:#10b981;--fuzzy:#f59e0b;--unknown:#ef4444;
  --radius:8px;--font-ui:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* Header */
header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:16px;font-weight:600;white-space:nowrap}
header .presets{display:flex;gap:6px;flex-wrap:wrap}
header .presets button{
  padding:5px 12px;font-size:12px;font-weight:500;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);border-radius:var(--radius);cursor:pointer;
  transition:all .15s;font-family:var(--font-ui);white-space:nowrap
}
header .presets button:hover{border-color:var(--accent);color:var(--text)}
header .presets button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.spacer{flex:1}
header .hint{font-size:11px;color:var(--text-muted);white-space:nowrap}

/* Main layout */
main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{
  width:300px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0
}
.sidebar section{padding:12px 16px;border-bottom:1px solid var(--border)}
.sidebar section h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px}
.sidebar .actions{display:flex;gap:6px;flex-wrap:wrap}
.sidebar .actions button{
  padding:4px 10px;font-size:11px;font-weight:500;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);border-radius:var(--radius);cursor:pointer;
  transition:all .15s;font-family:var(--font-ui)
}
.sidebar .actions button:hover{border-color:var(--accent);color:var(--text)}

.legend{display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}
.legend-dot{width:10px;height:10px;border-radius:50%}

.node-list{flex:1;overflow-y:auto;padding:8px 0}
.node-list-header{padding:4px 16px 8px;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.node-item{
  display:flex;align-items:center;gap:8px;padding:6px 16px;cursor:pointer;
  transition:background .1s;font-size:13px
}
.node-item:hover{background:var(--surface2)}
.node-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.node-item .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node-item .level{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);text-transform:uppercase;width:52px;text-align:right;flex-shrink:0}
.node-item.dimmed{opacity:.35}

/* Canvas area */
.canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* Tooltip */
.tooltip{
  position:absolute;pointer-events:none;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:8px 12px;font-size:12px;line-height:1.5;
  max-width:280px;opacity:0;transition:opacity .15s;z-index:10;
  box-shadow:0 4px 16px rgba(0,0,0,.4)
}
.tooltip.show{opacity:1}
.tooltip .tt-title{font-weight:600;margin-bottom:2px}
.tooltip .tt-desc{color:var(--text-muted)}

/* Prompt panel */
.prompt-panel{
  border-top:1px solid var(--border);background:var(--surface);padding:12px 20px;
  max-height:180px;overflow-y:auto;flex-shrink:0
}
.prompt-panel .prompt-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.prompt-panel .prompt-header h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted)}
.prompt-panel .copy-btn{
  padding:3px 10px;font-size:11px;font-weight:500;border:1px solid var(--border);
  background:var(--surface2);color:var(--text-muted);border-radius:var(--radius);cursor:pointer;
  transition:all .15s;font-family:var(--font-ui)
}
.prompt-panel .copy-btn:hover{border-color:var(--accent);color:var(--text)}
.prompt-panel .copy-btn.copied{border-color:var(--know);color:var(--know)}
.prompt-text{font-family:var(--font-mono);font-size:12px;line-height:1.6;color:var(--text-muted);white-space:pre-wrap}
.prompt-text .know{color:var(--know)}.prompt-text .fuzzy{color:var(--fuzzy)}.prompt-text .unknown{color:var(--unknown)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* Edge draw indicator */
.edge-indicator{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#fff;padding:4px 14px;border-radius:var(--radius);
  font-size:12px;font-weight:500;opacity:0;transition:opacity .15s;z-index:5;pointer-events:none
}
.edge-indicator.show{opacity:1}
</style>
</head>
<body>

<header>
  <h1>Open Brain Concept Map</h1>
  <div class="presets" id="presets"></div>
  <div class="spacer"></div>
  <div class="hint">Click: cycle level | Drag: move | Shift+click: draw edge</div>
</header>

<main>
  <div class="sidebar">
    <section>
      <h3>Actions</h3>
      <div class="actions">
        <button onclick="autoLayout()">Auto-layout</button>
        <button onclick="clearCustomEdges()">Clear custom edges</button>
        <button onclick="resetAll()">Reset all</button>
      </div>
    </section>
    <section>
      <h3>Legend</h3>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--know)"></div>Know</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--fuzzy)"></div>Fuzzy</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--unknown)"></div>Unknown</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Edge</div>
      </div>
    </section>
    <div class="node-list-header">Nodes</div>
    <div class="node-list" id="nodeList"></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="tooltip" id="tooltip"><div class="tt-title"></div><div class="tt-desc"></div></div>
    <div class="edge-indicator" id="edgeInd">Shift+click target node to complete edge</div>
  </div>
</main>

<div class="prompt-panel">
  <div class="prompt-header">
    <h3>Learning Prompt</h3>
    <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">Copy</button>
  </div>
  <div class="prompt-text" id="promptText"></div>
</div>

<script>
// ── Data ──
const LEVELS = ['know','fuzzy','unknown'];
const LEVEL_COLORS = {know:'#10b981',fuzzy:'#f59e0b',unknown:'#ef4444'};
const LEVEL_LABELS = {know:'Know',fuzzy:'Fuzzy',unknown:'Unknown'};

const NODE_DEFS = [
  {id:'obsidian',label:'Obsidian Vault',desc:'Local markdown-based knowledge base, source of truth for all notes'},
  {id:'pgvector',label:'pgvector',desc:'PostgreSQL extension enabling vector similarity search on embeddings'},
  {id:'mcp_proto',label:'MCP Protocol',desc:'Model Context Protocol \u2014 standardized way for AI to interact with tools'},
  {id:'wireguard',label:'WireGuard VPN',desc:'Lightweight VPN tunnel securing all traffic between Claude Code and VM'},
  {id:'chokidar',label:'Chokidar',desc:'Node.js file watcher library detecting .md file changes in real-time'},
  {id:'openai_emb',label:'OpenAI Embeddings',desc:'text-embedding-3-small model converting text to 1536-dim vectors'},
  {id:'sem_search',label:'Semantic Search',desc:'Finding similar notes by vector cosine similarity, not keyword matching'},
  {id:'txt_search',label:'Text Search',desc:'ILIKE + tag array filtering for keyword-based note discovery'},
  {id:'git_sync',label:'Git Sync',desc:'Bidirectional git push/pull every 2min keeping local and VM vaults in sync'},
  {id:'mcp_tools',label:'MCP Tools',desc:'6 tools: write_note, read_note, delete_note, search_semantic, search_text, list_recent'},
  {id:'path_prot',label:'Path Traversal Protection',desc:'safePath() validation preventing escape from vault directory'},
  {id:'hash_det',label:'Hash-based Change Detection',desc:'SHA256 file hash comparison to skip unchanged files'},
  {id:'yaml_fm',label:'YAML Frontmatter',desc:'Metadata block at top of .md files (title, tags, date)'},
  {id:'ivfflat',label:'IVFFlat Index',desc:'Approximate nearest neighbor index for fast vector search in pgvector'},
  {id:'zero_trust',label:'Zero Trust Architecture',desc:'No implicit trust \u2014 authenticate and authorize every request'},
  {id:'gcp_ce',label:'GCP Compute Engine',desc:'e2-small VM hosting PostgreSQL, watcher, and MCP server'},
  {id:'claude',label:'Claude Code',desc:'AI coding assistant that connects as MCP client to read/write notes'},
  {id:'watcher',label:'Vault Watcher Pipeline',desc:'File change \u2192 parse \u2192 hash check \u2192 embed \u2192 upsert to DB'},
];

const EDGE_DEFS = [
  {from:'obsidian',to:'git_sync',label:'synced via'},
  {from:'git_sync',to:'chokidar',label:'triggers'},
  {from:'chokidar',to:'watcher',label:'feeds into'},
  {from:'watcher',to:'yaml_fm',label:'parses'},
  {from:'watcher',to:'hash_det',label:'uses'},
  {from:'watcher',to:'openai_emb',label:'calls'},
  {from:'openai_emb',to:'pgvector',label:'stored in'},
  {from:'pgvector',to:'sem_search',label:'enables'},
  {from:'pgvector',to:'ivfflat',label:'accelerated by'},
  {from:'txt_search',to:'pgvector',label:'queries'},
  {from:'mcp_tools',to:'sem_search',label:'invokes'},
  {from:'mcp_tools',to:'txt_search',label:'invokes'},
  {from:'mcp_tools',to:'path_prot',label:'secured by'},
  {from:'mcp_proto',to:'mcp_tools',label:'defines'},
  {from:'claude',to:'mcp_proto',label:'uses'},
  {from:'claude',to:'wireguard',label:'connects through'},
  {from:'wireguard',to:'gcp_ce',label:'tunnels to'},
  {from:'gcp_ce',to:'pgvector',label:'hosts'},
  {from:'zero_trust',to:'wireguard',label:'enforced by'},
  {from:'zero_trust',to:'path_prot',label:'enforced by'},
];

const PRESETS = {
  full:{name:'Full Map',nodes:null},
  pipeline:{name:'Data Pipeline',nodes:['obsidian','git_sync','chokidar','watcher','yaml_fm','hash_det','openai_emb','pgvector']},
  search:{name:'Search System',nodes:['pgvector','sem_search','txt_search','ivfflat','mcp_tools','mcp_proto','openai_emb']},
  security:{name:'Security',nodes:['zero_trust','wireguard','path_prot','gcp_ce','claude']},
  mcp_flow:{name:'MCP Flow',nodes:['claude','mcp_proto','mcp_tools','sem_search','txt_search','pgvector','wireguard','gcp_ce']},
};

// ── State ──
let nodes = NODE_DEFS.map((d,i) => ({...d, level:'fuzzy', x:0, y:0, vx:0, vy:0}));
let edges = EDGE_DEFS.map(e => ({...e, custom:false}));
let customEdges = [];
let activePreset = 'full';
let visibleNodeIds = null;
let dragging = null;
let dragOffX = 0, dragOffY = 0;
let hovered = null;
let edgeSource = null;
let panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPX = 0, panStartPY = 0;

const NODE_R = 26;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const edgeInd = document.getElementById('edgeInd');

// ── Helpers ──
function nodeById(id){ return nodes.find(n=>n.id===id) }
function allEdges(){ return edges.concat(customEdges) }
function isVisible(id){ return !visibleNodeIds || visibleNodeIds.has(id) }
function visibleNodes(){ return nodes.filter(n=>isVisible(n.id)) }
function visibleEdges(){ return allEdges().filter(e=>isVisible(e.from)&&isVisible(e.to)) }

function resize(){
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  canvas.style.width = r.width+'px';
  canvas.style.height = r.height+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
window.addEventListener('resize',()=>{resize();draw()});

// ── Initial layout ──
function initPositions(){
  const w = canvas.parentElement.clientWidth || 900;
  const h = canvas.parentElement.clientHeight || 600;
  const cx = w/2, cy = h/2;
  const n = nodes.length;
  nodes.forEach((nd,i)=>{
    const angle = (2*Math.PI*i)/n - Math.PI/2;
    const rx = Math.min(w,h)*0.38;
    const ry = rx * 0.7;
    nd.x = cx + Math.cos(angle)*rx;
    nd.y = cy + Math.sin(angle)*ry;
  });
}

// ── Force-directed layout ──
function autoLayout(){
  const w = canvas.parentElement.clientWidth;
  const h = canvas.parentElement.clientHeight;
  const vis = visibleNodes();
  const vEdges = visibleEdges();
  const cx = w/2 - panX, cy = h/2 - panY;

  // reset to center area
  vis.forEach((nd,i)=>{
    const a = (2*Math.PI*i)/vis.length;
    nd.x = cx + Math.cos(a)*150;
    nd.y = cy + Math.sin(a)*150;
    nd.vx = 0; nd.vy = 0;
  });

  const idSet = new Set(vis.map(n=>n.id));
  const steps = 300;
  for(let s=0;s<steps;s++){
    const alpha = 1 - s/steps;
    const k = 120;
    // repulsion
    for(let i=0;i<vis.length;i++){
      for(let j=i+1;j<vis.length;j++){
        let dx=vis[j].x-vis[i].x, dy=vis[j].y-vis[i].y;
        let d=Math.sqrt(dx*dx+dy*dy)||1;
        let f = (k*k)/d * alpha * 0.5;
        let fx=dx/d*f, fy=dy/d*f;
        vis[i].vx-=fx; vis[i].vy-=fy;
        vis[j].vx+=fx; vis[j].vy+=fy;
      }
    }
    // attraction along edges
    for(const e of vEdges){
      if(!idSet.has(e.from)||!idSet.has(e.to)) continue;
      const a=nodeById(e.from), b=nodeById(e.to);
      let dx=b.x-a.x, dy=b.y-a.y;
      let d=Math.sqrt(dx*dx+dy*dy)||1;
      let f = (d - k) * 0.04 * alpha;
      let fx=dx/d*f, fy=dy/d*f;
      a.vx+=fx; a.vy+=fy;
      b.vx-=fx; b.vy-=fy;
    }
    // center gravity
    vis.forEach(nd=>{
      nd.vx+=(cx-nd.x)*0.002*alpha;
      nd.vy+=(cy-nd.y)*0.002*alpha;
    });
    // apply
    vis.forEach(nd=>{
      nd.vx*=0.85; nd.vy*=0.85;
      nd.x+=nd.vx; nd.y+=nd.vy;
      nd.x=Math.max(NODE_R+10,Math.min(w-panX-NODE_R-10,nd.x));
      nd.y=Math.max(NODE_R+10,Math.min(h-panY-NODE_R-10,nd.y));
    });
  }
  draw();
}

// ── Drawing ──
function draw(){
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.clearRect(0,0,w,h);
  ctx.save();
  ctx.translate(panX, panY);

  const vEdges = visibleEdges();
  const vNodes = visibleNodes();

  // edges
  for(const e of vEdges){
    const a=nodeById(e.from), b=nodeById(e.to);
    if(!a||!b) continue;
    const dx=b.x-a.x, dy=b.y-a.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const ux=dx/d, uy=dy/d;
    const sx=a.x+ux*NODE_R, sy=a.y+uy*NODE_R;
    const ex=b.x-ux*NODE_R, ey=b.y-uy*NODE_R;

    ctx.beginPath();
    ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
    ctx.strokeStyle = e.custom ? '#6366f1' : '#3a3f54';
    ctx.lineWidth = e.custom ? 1.5 : 1;
    ctx.stroke();

    // arrow
    const al=8, aa=Math.PI/7;
    const ang=Math.atan2(ey-sy,ex-sx);
    ctx.beginPath();
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex-al*Math.cos(ang-aa),ey-al*Math.sin(ang-aa));
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex-al*Math.cos(ang+aa),ey-al*Math.sin(ang+aa));
    ctx.strokeStyle = e.custom ? '#6366f1' : '#4a5068';
    ctx.lineWidth = e.custom ? 1.5 : 1;
    ctx.stroke();

    // label
    if(e.label){
      const mx=(sx+ex)/2, my=(sy+ey)/2;
      ctx.font='10px '+getComputedStyle(document.body).fontFamily;
      ctx.fillStyle='#6b7094';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      // offset perpendicular
      const px=-uy*12, py=ux*12;
      ctx.fillText(e.label, mx+px, my+py-2);
    }
  }

  // nodes
  for(const nd of vNodes){
    const col = LEVEL_COLORS[nd.level];
    // glow
    ctx.beginPath();ctx.arc(nd.x,nd.y,NODE_R+4,0,Math.PI*2);
    ctx.fillStyle=col+'18';ctx.fill();

    // circle
    ctx.beginPath();ctx.arc(nd.x,nd.y,NODE_R,0,Math.PI*2);
    ctx.fillStyle=var_surface2();
    ctx.fill();
    ctx.strokeStyle=col;
    ctx.lineWidth = (hovered===nd || edgeSource===nd) ? 3 : 2;
    ctx.stroke();

    // label
    ctx.font='600 11px '+getComputedStyle(document.body).fontFamily;
    ctx.fillStyle=var_text();
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lines = wrapText(nd.label, 50);
    lines.forEach((line,i)=>{
      const y = nd.y + (i - (lines.length-1)/2)*13;
      ctx.fillText(line, nd.x, y);
    });
  }

  // edge draw line
  if(edgeSource && _mouse){
    ctx.beginPath();
    ctx.moveTo(edgeSource.x, edgeSource.y);
    ctx.lineTo(_mouse.x - panX, _mouse.y - panY);
    ctx.strokeStyle='#6366f1';ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
  }

  ctx.restore();
}

function var_surface2(){return '#242834'}
function var_text(){return '#e2e4eb'}

function wrapText(t, maxW){
  const words = t.split(' ');
  if(words.length<=2) return [t];
  const mid = Math.ceil(words.length/2);
  return [words.slice(0,mid).join(' '), words.slice(mid).join(' ')];
}

// ── Interaction ──
let _mouse = null;

function canvasCoords(e){
  const r=canvas.getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function nodeAt(mx,my){
  const vn = visibleNodes();
  for(let i=vn.length-1;i>=0;i--){
    const n=vn[i];
    const dx=mx-panX-n.x, dy=my-panY-n.y;
    if(dx*dx+dy*dy <= NODE_R*NODE_R) return n;
  }
  return null;
}

canvas.addEventListener('mousedown',e=>{
  const p=canvasCoords(e);
  const nd=nodeAt(p.x,p.y);
  if(e.shiftKey && nd){
    if(!edgeSource){
      edgeSource=nd;
      edgeInd.classList.add('show');
    } else if(nd!==edgeSource){
      customEdges.push({from:edgeSource.id,to:nd.id,label:'',custom:true});
      edgeSource=null;
      edgeInd.classList.remove('show');
      updatePrompt();
    }
    draw();
    return;
  }
  if(nd){
    dragging=nd;
    dragOffX=nd.x-(p.x-panX); dragOffY=nd.y-(p.y-panY);
  } else {
    isPanning=true; panStartX=p.x; panStartY=p.y; panStartPX=panX; panStartPY=panY;
  }
});

canvas.addEventListener('mousemove',e=>{
  const p=canvasCoords(e);
  _mouse=p;
  if(dragging){
    dragging.x=p.x-panX+dragOffX; dragging.y=p.y-panY+dragOffY;
    draw(); return;
  }
  if(isPanning){
    panX=panStartPX+(p.x-panStartX); panY=panStartPY+(p.y-panStartY);
    draw(); return;
  }
  const nd=nodeAt(p.x,p.y);
  if(nd!==hovered){
    hovered=nd;
    draw();
    if(nd){
      tooltip.querySelector('.tt-title').textContent=nd.label;
      tooltip.querySelector('.tt-desc').textContent=nd.desc;
      tooltip.classList.add('show');
    } else {
      tooltip.classList.remove('show');
    }
  }
  if(hovered){
    tooltip.style.left=Math.min(p.x+14, canvas.clientWidth-290)+'px';
    tooltip.style.top=(p.y+14)+'px';
  }
  if(edgeSource) draw();
});

canvas.addEventListener('mouseup',e=>{
  if(dragging && !_dragMoved){
    // was a click
  }
  dragging=null;
  isPanning=false;
});

canvas.addEventListener('click',e=>{
  if(e.shiftKey) return;
  const p=canvasCoords(e);
  const nd=nodeAt(p.x,p.y);
  if(nd) cycleLevel(nd);
});

canvas.addEventListener('mouseleave',()=>{
  hovered=null; tooltip.classList.remove('show'); _mouse=null; draw();
});

function cycleLevel(nd){
  const i=LEVELS.indexOf(nd.level);
  nd.level=LEVELS[(i+1)%LEVELS.length];
  draw(); buildNodeList(); updatePrompt();
}

// ── Node list ──
function buildNodeList(){
  const list=document.getElementById('nodeList');
  list.innerHTML='';
  const sorted=[...nodes].sort((a,b)=>a.label.localeCompare(b.label));
  sorted.forEach(nd=>{
    const div=document.createElement('div');
    div.className='node-item'+(isVisible(nd.id)?'':' dimmed');
    div.innerHTML=`<div class="dot" style="background:${LEVEL_COLORS[nd.level]}"></div><div class="name">${nd.label}</div><div class="level">${LEVEL_LABELS[nd.level]}</div>`;
    div.onclick=()=>cycleLevel(nd);
    list.appendChild(div);
  });
}

// ── Presets ──
function buildPresets(){
  const wrap=document.getElementById('presets');
  wrap.innerHTML='';
  for(const [k,v] of Object.entries(PRESETS)){
    const btn=document.createElement('button');
    btn.textContent=v.name;
    btn.className = k===activePreset?'active':'';
    btn.onclick=()=>setPreset(k);
    wrap.appendChild(btn);
  }
}

function setPreset(k){
  activePreset=k;
  const p=PRESETS[k];
  visibleNodeIds = p.nodes ? new Set(p.nodes) : null;
  buildPresets(); buildNodeList(); draw(); updatePrompt();
}

// ── Prompt ──
function updatePrompt(){
  const know=[], fuzzy=[], unknown=[];
  nodes.forEach(n=>{
    if(n.level==='know') know.push(n.label);
    else if(n.level==='fuzzy') fuzzy.push(n.label);
    else unknown.push(n.label);
  });

  const edgeList = visibleEdges().map(e=>{
    const a=nodeById(e.from), b=nodeById(e.to);
    return `${a.label} -[${e.label||'related'}]-> ${b.label}`;
  });

  const parts=[];
  parts.push("I'm learning Open Brain architecture.\n\n");
  if(know.length) parts.push(`I already understand: <span class="know">${know.join(', ')}</span>.\n\n`);
  if(fuzzy.length) parts.push(`I'm fuzzy on: <span class="fuzzy">${fuzzy.join(', ')}</span>.\n\n`);
  if(unknown.length) parts.push(`I have no idea about: <span class="unknown">${unknown.join(', ')}</span>.\n\n`);
  if(edgeList.length) parts.push(`Relationships I want to understand:\n${edgeList.map(e=>'  '+e).join('\n')}\n\n`);
  parts.push('Please explain the fuzzy and unknown concepts, building on what I already know. Use concrete code references from the project.');

  document.getElementById('promptText').innerHTML = parts.join('');
}

function getPromptPlainText(){
  const el=document.getElementById('promptText');
  return el.textContent || el.innerText;
}

function copyPrompt(){
  const text=getPromptPlainText();
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='Copied!'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied')},1500);
  });
}

// ── Actions ──
function clearCustomEdges(){
  customEdges=[];edgeSource=null;edgeInd.classList.remove('show');draw();updatePrompt();
}

function resetAll(){
  nodes.forEach(n=>n.level='fuzzy');
  customEdges=[];edgeSource=null;edgeInd.classList.remove('show');
  panX=0;panY=0;
  activePreset='full';visibleNodeIds=null;
  initPositions();autoLayout();buildPresets();buildNodeList();updatePrompt();
}

// ── Init ──
resize();
initPositions();
buildPresets();
buildNodeList();
updatePrompt();
autoLayout();
draw();
</script>
</body>
