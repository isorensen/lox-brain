name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (sequential — respect workspace dependency order)
        run: |
          npm run build --workspace=packages/shared
          npm run build --workspace=packages/team
          npm run build --workspace=packages/core
          npm run build --workspace=packages/installer

      - name: Type check
        run: |
          npx tsc --noEmit --project packages/shared/tsconfig.json
          npx tsc --noEmit --project packages/team/tsconfig.json
          npx tsc --noEmit --project packages/core/tsconfig.json
          npx tsc --noEmit --project packages/installer/tsconfig.json

      - name: Test
        run: npm run test --workspaces

      - name: Test with coverage (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: npm run test:coverage --workspace=packages/core

      - name: Security audit (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: npm audit --audit-level=high
